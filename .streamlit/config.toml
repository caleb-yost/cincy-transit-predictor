# Apple-style theme: clean light + dark that follow the viewer's system setting.
[client]
toolbarMode = "minimal"

[theme]
base = "light"
font = "Inter"

[[theme.fontFaces]]
family = "Inter"
url = "https://rsms.me/inter/font-files/InterVariable.woff2?v=4.1"
weight = "100 900"
style = "normal"

[theme.light]
primaryColor = "#0071e3"
backgroundColor = "#f5f5f7"
secondaryBackgroundColor = "#ffffff"
textColor = "#1d1d1f"
borderColor = "#e5e5ea"

[theme.dark]
primaryColor = "#0a84ff"
backgroundColor = "#000000"
secondaryBackgroundColor = "#1c1c1e"
textColor = "#f5f5f7"
borderColor = "#38383a"
