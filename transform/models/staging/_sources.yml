version: 2

sources:
  - name: raw
    description: "Realtime snapshots landed by the ingestion job (partitioned Parquet)."
    meta:
      external_location: "read_parquet('{{ env_var('DBT_DATA_DIR', '../data') }}/raw/{name}/**/*.parquet', union_by_name=true, hive_partitioning=true)"
    tables:
      - name: trip_updates
      - name: vehicle_positions
      - name: weather

  - name: reference
    description: "Static GTFS schedule tables (refreshed weekly)."
    meta:
      external_location: "read_parquet('{{ env_var('DBT_DATA_DIR', '../data') }}/reference/{name}.parquet')"
    tables:
      - name: stops
      - name: routes
      - name: trips
      - name: stop_times
